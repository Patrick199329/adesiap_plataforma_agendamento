<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vehicle Checklist - Precision Logistics</title>

                        "inverse-primary": "#abc7ff",

                        "surface-container-low": "#f2f4f7",

                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#e0e3e6",
                        "on-tertiary-fixed-variant": "#743417",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f7f9fc",
                        "secondary-fixed-dim": "#bac7de",
                        "primary-fixed": "#d7e2ff",
                        "on-tertiary-fixed": "#360f00",

                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]

            },

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-slate-50 dark:bg-slate-900 flex items-center px-4 h-16 justify-between">
<div class="flex items-center gap-4">
<button class="text-blue-900 dark:text-blue-200 hover:bg-slate-100 dark:hover:bg-slate-800 p-2 rounded-full transition-all active:opacity-70 active:scale-95">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-blue-900 dark:text-blue-200">Vehicle Checklist</h1>
</div>
<div class="h-8 w-8 flex items-center justify-center rounded-full bg-primary-container text-on-primary-container">
<span class="material-symbols-outlined text-sm">notifications</span>
</div>
</header>
<div class="bg-slate-200 dark:bg-slate-800 h-[1px] w-full"></div>
<main class="px-4 py-6 space-y-6 max-w-lg mx-auto">
<!-- Vehicle Info Card (Asymmetric Layout) -->
<section class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_4px_20px_rgba(25,28,30,0.04)] flex">
<div class="w-2 bg-primary"></div>
<div class="p-5 flex-1 flex justify-between items-start">
<div class="space-y-1">
<span class="text-[10px] uppercase tracking-widest font-bold text-on-primary-container bg-primary-fixed px-2 py-0.5 rounded-full">Iniciando Viagem</span>
<h2 class="text-xl font-headline font-extrabold text-primary pt-1">Volvo FH 540</h2>
<p class="text-secondary font-label text-sm font-medium tracking-wide">Placa: ABC-1234</p>
</div>
<div class="bg-surface-container rounded-lg p-3">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
</div>
</div>
</section>
<!-- Checklist Title -->
<div class="flex items-center justify-between">
<h3 class="text-on-surface-variant font-headline font-bold text-sm tracking-tight">ITENS DE VERIFICAÇÃO</h3>
<span class="text-primary text-[10px] font-bold">5 ITENS</span>
</div>
<!-- Checklist Bento-ish Grid/List -->
<div class="space-y-4">
<!-- Item 1: Compliant -->
<article class="bg-surface-container-low rounded-xl p-4 transition-all">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-container-lowest flex items-center justify-center text-primary">
<span class="material-symbols-outlined">tire_repair</span>
</div>
<span class="font-headline font-bold text-on-surface">Pneus</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</article>
<!-- Item 2: Non-Compliant (Expanded Problem Report) -->
<article class="bg-surface-container-low rounded-xl p-4 border-l-4 border-error space-y-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-error-container flex items-center justify-center text-on-error-container">
<span class="material-symbols-outlined">lightbulb</span>
</div>
<span class="font-headline font-bold text-on-surface">Luzes/Faróis</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Relatar Problema Section -->
<div class="bg-surface-container-lowest rounded-lg p-4 space-y-3">
<p class="text-xs font-bold text-on-tertiary-fixed-variant uppercase tracking-tighter">Relatar Problema</p>
<textarea class="w-full bg-surface-container-high border-none rounded-lg text-sm font-body p-3 focus:ring-0 focus:bg-surface-container-highest transition-colors min-h-[80px]" placeholder="Descreva a observação..."></textarea>
<div class="flex gap-2">
<button class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg bg-surface-container-highest text-on-surface-variant font-label text-sm font-semibold transition-all active:scale-95">
<span class="material-symbols-outlined text-sm">photo_camera</span>
                            Tirar Foto
                        </button>
<button class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg bg-surface-container-highest text-on-surface-variant font-label text-sm font-semibold transition-all active:scale-95">
<span class="material-symbols-outlined text-sm">upload_file</span>
                            Anexar
                        </button>
</div>
</div>
</article>
<!-- Item 3 -->
<article class="bg-surface-container-low rounded-xl p-4 transition-all">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-container-lowest flex items-center justify-center text-primary">
<span class="material-symbols-outlined">oil_barrel</span>
</div>
<span class="font-headline font-bold text-on-surface">Nível de Óleo</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</article>
<!-- Item 4 -->
<article class="bg-surface-container-low rounded-xl p-4 transition-all">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-container-lowest flex items-center justify-center text-primary">
<span class="material-symbols-outlined">settings_backup_restore</span>
</div>
<span class="font-headline font-bold text-on-surface">Freios</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</article>
<!-- Item 5 -->
<article class="bg-surface-container-low rounded-xl p-4 transition-all">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-container-lowest flex items-center justify-center text-primary">
<span class="material-symbols-outlined">cleaning_services</span>
</div>
<span class="font-headline font-bold text-on-surface">Limpeza Interna</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</article>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-white/70 dark:bg-slate-900/70 backdrop-blur-md shadow-[0_-4px_20px_rgba(25,28,30,0.06)] z-50">
<button class="w-full py-4 rounded-xl bg-primary text-on-primary font-headline font-bold text-base tracking-wide flex items-center justify-center gap-3 transition-all active:scale-95 shadow-lg">
            Finalizar Checklist
            <span class="material-symbols-outlined text-lg">check_circle</span>
</button>
</div>
<!-- BottomNavBar (Hidden for focused task as per suppression rule, but shown for context of the JSON structure) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-6 py-3 pb-safe bg-white/70 dark:bg-slate-900/70 backdrop-blur-md hidden">
<div class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-3">
<span class="material-symbols-outlined">history</span>
</div>
<div class="flex flex-col items-center justify-center bg-blue-100 dark:bg-blue-900/40 text-blue-900 dark:text-blue-100 rounded-xl p-3">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</nav>
</body></html>
