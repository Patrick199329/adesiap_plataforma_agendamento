<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title id="app-title">FrotaFlow - Gestão de Frotas Pro</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <!-- Tailwind v3 CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, .display-font {
            font-family: 'Manrope', sans-serif;
        }
        
        /* Premium Customizations */
        .signature-gradient {
            background: linear-gradient(135deg, #00193c 0%, #002d62 100%);
        }
        .custom-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
        
        /* Architectural Command No-Line Rules */
        .surface-lift {
            background-color: #ffffff;
            box-shadow: 0 40px 60px -15px rgba(25, 28, 30, 0.04);
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e0e3e6;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #c4c6d1;
        }

        /* Print Styles */
        @media print {
            #sidebar, header, .no-print {
                display: none !important;
            }
            main {
                margin-left: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
            }
            #view-content {
                padding: 0 !important;
                overflow: visible !important;
            }
            body {
                background: #ffffff !important;
                overflow: visible !important;
            }
            .page-break {
                page-break-after: always;
            }
            .landscape {
                page-break-before: always;
            }
            @page {
                size: A4 portrait;
                margin: 10mm;
            }
            .landscape-page {
                @page { size: A4 landscape; }
            }
        }
    </style>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00193c",
                        "primary-container": "#002d62",
                        "on-primary": "#ffffff",
                        "secondary": "#525f73",
                        "on-secondary": "#ffffff",
                        "surface": "#f7f9fc",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#43474f",
                        "surface-container-low": "#f2f4f7",
                        "surface-container-high": "#e6e8eb",
                        "surface-container-highest": "#e0e3e6",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c4c6d1",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "tertiary": "#ff6b35", /* High visibility accent */
                    },
                    borderRadius: {
                        "sm": "0.25rem",
                        "md": "0.375rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface flex min-h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="flex flex-col h-screen py-6 bg-white border-r-0 fixed left-0 top-0 z-50 transition-all duration-300 w-64">
        <div class="px-6 mb-10 flex items-center justify-between">
            <div id="sidebar-logo-container">
                <img id="sidebar-logo" src="" class="h-10 w-auto object-contain hidden mb-4">
                <h1 id="sidebar-system-name" class="text-xl font-extrabold tracking-tight text-primary">FrotaFlow</h1>
                <p id="sidebar-system-subtitle" class="text-[10px] text-on-surface-variant font-bold uppercase tracking-[0.2em] opacity-60"></p>
            </div>
            <span class="material-symbols-outlined text-primary lg:hidden cursor-pointer" onclick="toggleSidebar()">close</span>
        </div>

        <nav class="flex-1 space-y-1 overflow-y-auto px-3">
            <a href="#agendamentos" class="nav-item group" data-page="agendamentos">
                <span class="material-symbols-outlined nav-icon" data-icon="calendar_month">calendar_month</span>
                <span class="nav-text">Agendamentos</span>
            </a>
            <a href="#manutencao" class="nav-item group" data-page="manutencao">
                <span class="material-symbols-outlined nav-icon" data-icon="build">build</span>
                <span class="nav-text">Manutenção</span>
            </a>

            <!-- Grupo Cadastros -->
            <div class="pt-4 pb-2 px-4">
                <p class="text-[9px] font-black text-on-surface-variant uppercase tracking-[0.2em] opacity-40">Cadastros</p>
            </div>

            <a href="#veiculos" class="nav-item group" data-page="veiculos">
                <span class="material-symbols-outlined nav-icon" data-icon="local_shipping">local_shipping</span>
                <span class="nav-text">Veículos</span>
            </a>
            <a href="#usuarios" class="nav-item group" data-page="usuarios">
                <span class="material-symbols-outlined nav-icon" data-icon="group">group</span>
                <span class="nav-text">Usuários</span>
            </a>
            <a href="#inspecoes" class="nav-item group" data-page="inspecoes">
                <span class="material-symbols-outlined nav-icon" data-icon="fact_check">fact_check</span>
                <span class="nav-text">Inspeções</span>
            </a>
            <a href="#projetos" class="nav-item group" data-page="projetos">
                <span class="material-symbols-outlined nav-icon" data-icon="account_balance_wallet">account_balance_wallet</span>
                <span class="nav-text">Projetos</span>
            </a>

            <!-- Separador -->
            <div class="my-4 border-t border-surface-container mx-4 opacity-50"></div>

            <a href="#relatorios" class="nav-item group" data-page="relatorios">
                <span class="material-symbols-outlined nav-icon" data-icon="assignment">assignment</span>
                <span class="nav-text">Relatórios</span>
            </a>
        </nav>

        <div class="px-4 mt-6">
            <button onclick="window.location.hash='#novo-agendamento'" class="w-full signature-gradient text-white py-3 rounded-lg font-bold text-sm shadow-xl shadow-primary/20 flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform">
                <span class="material-symbols-outlined text-lg">add</span>
                Novo Agendamento
            </button>
        </div>

        <div class="mt-auto px-6 space-y-2 border-t border-surface-container pt-6">
            <a href="#configuracoes" class="flex items-center text-xs font-semibold text-on-surface-variant hover:text-primary transition-colors gap-3">
                <span class="material-symbols-outlined text-lg">settings</span>
                Configurações
            </a>
            <a onclick="App.actions.logout()" class="flex items-center text-xs font-semibold text-on-surface-variant hover:text-primary transition-colors gap-3 cursor-pointer">
                <span class="material-symbols-outlined text-lg">logout</span>
                Sair do Sistema
            </a>
        </div>
    </aside>

    <!-- App Shell Wrapper -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden lg:ml-64 bg-surface transition-all duration-300">
        
        <!-- Header -->
        <header class="flex justify-between items-center px-8 h-20 w-full bg-white/70 backdrop-blur-md sticky top-0 z-40">
            <div class="flex items-center gap-4 flex-1 max-w-xl">
                <button class="lg:hidden text-primary p-2" onclick="toggleSidebar()">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="relative w-full group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-xl">search</span>
                    <input class="w-full pl-12 pr-4 py-2.5 bg-surface-container-low border-none rounded-xl text-sm focus:ring-4 focus:ring-primary/5 placeholder:text-slate-400 transition-all" placeholder="Buscar veículo, motorista ou viagem..." type="text"/>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3">
                    <button class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-surface-container-high text-on-surface-variant relative transition-colors">
                        <span class="material-symbols-outlined">notifications</span>
                        <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full border-2 border-white"></span>
                    </button>
                </div>
                <div class="h-8 w-[1px] bg-outline-variant/30"></div>
                <div class="flex items-center gap-3 cursor-pointer group">
                    <div class="text-right hidden sm:block">
                        <p id="user-name" class="text-sm font-extrabold text-primary tracking-tight">C. Logística</p>
                        <p id="user-role" class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider opacity-60">Operador Admin</p>
                    </div>
                    <div id="user-avatar" class="w-11 h-11 rounded-xl bg-primary flex items-center justify-center text-white font-black text-sm group-hover:scale-105 transition-transform shadow-lg shadow-primary/20 uppercase">
                        <!-- Iniciais injetadas via JS -->
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content (Dynamic) -->
        <div id="view-content" class="flex-1 overflow-y-auto overflow-x-hidden p-8">
            <!-- Loader -->
            <div class="h-full flex items-center justify-center">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-primary/10 border-t-primary"></div>
            </div>
        </div>
    </main>

    <!-- Navigation CSS -->
    <style>
        .nav-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            color: #525f73; /* secondary color placeholder */
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 0.75rem;
        }
        .nav-item:hover {
            color: #00193c;
            background-color: #f2f4f7;
        }
        .nav-item.active {
            background-color: #00193c;
            color: #ffffff;
            box-shadow: 0 10px 15px -3px rgba(0, 25, 60, 0.2);
        }
        .nav-item.active .nav-icon {
            color: #ffffff;
            opacity: 1;
        }
        .nav-icon {
            font-size: 1.25rem !important;
            opacity: 0.7;
            transition: all 0.2s;
        }
    </style>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Project Data & Logic -->
    <script src="js/supabase-client.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const main = document.querySelector('main');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
            } else {
                sidebar.classList.add('-translate-x-full');
            }
        }
        
        // Mobile Sidebar Init
        if (window.innerWidth < 1024) {
            document.getElementById('sidebar').classList.add('-translate-x-full');
        }
    </script>
</body>
</html>
